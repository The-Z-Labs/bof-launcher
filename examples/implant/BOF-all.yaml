- name: file_path
  desc: "path to a file that will be overwritten"
  type: string
  required: true
- name: offset 
  desc: "offset in overwritten file"
  type: string
  required: true
- name: data
  desc: "data to be written to the provided at provided offset"
  type: string
  required: true
