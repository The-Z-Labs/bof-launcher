name: netuse
srcfile: "entry"
description: "Connect/disconnect a computer to/from a shared resource. List locally bound connections"
author: Trustedsec
tags: ['windows', 'host-recon', 'trustedsec', 'CS-Situational-Awareness-BOF']
OS: Windows
entrypoint: "go"
sources:
    - 'https://raw.githubusercontent.com/trustedsec/CS-Situational-Awareness-BOF/refs/heads/master/src/SA/netuse/entry.c'
    - 'https://raw.githubusercontent.com/trustedsec/CS-Situational-Awareness-BOF/refs/heads/master/src/common/base.c'
    - 'https://raw.githubusercontent.com/trustedsec/CS-Situational-Awareness-BOF/refs/heads/master/src/common/bofdefs.h'
examples: '
 Bind IPC$ of a remote computer using current user context:
    netuse 1 "dc.local\\IPC$" "" "" "" 0 0

 Map a Share creating a specific device mapping, using a diferent set of credentials:
    netuse 1 "dc.local\\res" user passwd F 0 0

 List local connections:
    netuse 2 "" "" "" "" 0 0

 List all info about Z:
    netuse 2 "" "" "" "Z:" 0 0

 Delete the share with the local device name Y:
    netuse 3 Y "" "" "" 0 0

 Delete the share with an unmapped local device name
    netuse_delete "\\\\fileshare.somecomp.local\\Public"

 Delete a share and remove its persistent mapping
    netuse 3 Y "" "" "" 1 0

 Note if the share has a local device name mapped you must delete using the local name
'
arguments:
  - name: cmd
    desc: "cmd: 1 - Connect to a shared resource; 2 - List locally bound connections; 3 - disconnect from a shared resource"
    type: short
    required: true
  - name: sharename
    desc: "User name"
    type: wstring
    required: true
  - name: username
    desc: "User name"
    type: wstring
    required: true
  - name: password
    desc: "User password"
    type: wstring
    required: true
  - name: device
    desc: "The device name on the local system to bind the connection to"
    type: wstring
    required: true
  - name: persist
    desc: "persist: 0 - false; 1 - true"
    type: short
    required: true
  - name: requirePrivacy
    desc: "requirePrivacy: 0 - false; 1 - true"
    type: short
    required: true
